<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song UI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f0f;
            --sidebar-color: #0f0f0f;
            --text-primary: #fff;
            --text-secondary: #aaa;
            --accent-red: #ff0000;
            --card-bg: #181818;
            --hover-bg: #272727;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background-color: var(--sidebar-color);
            padding: 20px;
            border-right: 1px solid #222;
        }
        .brand {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-items {
            list-style: none;
        }
        .nav-item {
            padding: 12px 10px;
            margin-bottom: 5px;
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--text-secondary);
            font-weight: 500;
            transition: all 0.3s;
        }
        .nav-item:hover, .nav-item.active {
            background-color: var(--hover-bg);
            color: var(--text-primary);
        }

        /* Main Content */
        .main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 20px 40px;
            overflow-y: auto;
        }

        /* Search Header */
        .header {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }
        .search-bar {
            background-color: #121212;
            border: 1px solid #333;
            border-radius: 30px;
            padding: 10px 20px;
            width: 50%;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .search-bar input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            width: 100%;
            font-size: 16px;
        }
        .search-bar i {
            color: var(--text-secondary);
        }

        /* Content Layout */
        .content-grid {
            display: flex;
            gap: 40px;
        }

        /* Featured Section */
        .featured {
            flex: 2;
        }
        .featured-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        .featured-title {
            font-size: 24px;
            font-weight: 700;
        }
        .featured-artist {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 5px;
        }
        .open-btn {
            background: transparent;
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .open-btn:hover {
            background: rgba(255,0,0,0.1);
        }
        
        .video-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .featured-details {
            margin-top: 15px;
        }
        .featured-details p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 5px;
        }

        /* Recommended Section */
        .recommended {
            flex: 1;
        }
        .recommended-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .rec-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, border 0.2s;
            border: 2px solid transparent;
        }
        .card:hover, .card.active {
            border-color: var(--accent-red);
            transform: scale(1.02);
        }
        .card-img-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #222;
        }
        .card-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-info {
            padding: 15px;
        }
        .card-title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 4px;
        }
        .card-desc {
            color: var(--text-secondary);
            font-size: 13px;
        }

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">
            <span>SONG UI</span>
        </div>
        <ul class="nav-items">
            <li class="nav-item active"><i class="fa-solid fa-house"></i> Home</li>
            <li class="nav-item"><i class="fa-solid fa-fire"></i> Trending</li>
            <li class="nav-item"><i class="fa-solid fa-music"></i> Music</li>
        </ul>
    </div>

    <div class="main">
        <div class="header">
            <div class="search-bar">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="search-input" placeholder="Search">
            </div>
        </div>

        <div class="content-grid">
            <div class="featured">
                <div class="featured-header">
                    <div>
                        <div class="featured-title" id="feat-title">One</div>
                        <div class="featured-artist" id="feat-artist">U2 • Achtung Baby • Rock</div>
                    </div>
                    <a href="#" class="open-btn" id="feat-link" target="_blank">OPEN <i class="fa-solid fa-external-link-alt"></i></a>
                </div>
                
                <div class="video-container">
                    <iframe id="video-frame" src="https://www.youtube.com/embed/ftjEcrrf7r0?autoplay=0" allowfullscreen></iframe>
                </div>

                <div class="featured-details">
                    <div class="featured-title" id="feat-bottom-title">One</div>
                    <div class="featured-artist" id="feat-bottom-artist">U2 • Achtung Baby • Rock</div>
                    <p>Search like YouTube, then click a card in "Recommended" to play.</p>
                </div>
            </div>

            <div class="recommended">
                <div class="recommended-title">Recommended</div>
                <div class="rec-grid" id="recommended-list">
                    <!-- Cards will be populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
