<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song App</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; background: #f4f4f9; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; }
        .form-group input { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 0.75rem; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        button:hover { background: #0056b3; }
        .song-list { margin-top: 2rem; }
        .song-item { padding: 1rem; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .song-item:last-child { border-bottom: none; }
        .error { color: red; font-size: 0.9em; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Song Manager</h1>
        <div id="error-message" class="error"></div>
        <form id="song-form">
            <div class="form-group">
                <label for="title">Song Title</label>
                <input type="text" id="title" required>
            </div>
            <div class="form-group">
                <label for="artist">Artist</label>
                <input type="text" id="artist" required>
            </div>
            <button type="submit">Add Song</button>
        </form>

        <div class="song-list" id="song-list">
            <!-- Songs will be loaded here -->
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
